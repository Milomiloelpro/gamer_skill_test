<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Perfil de {{ username }}</title>
<link rel="stylesheet" href="/static/style.css">
<style>
body { background: #000000; color: white; font-family: Arial, sans-serif; text-align: center; }
h1 { margin-top: 20px; }
.container { margin: auto; width: 80%; max-width: 600px; }
table { margin: 20px auto; border-collapse: collapse; width: 100%; }
th, td { border: 2px solid white; padding: 10px; }
th { background-color: #222; }
.back-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 10px 20px;
    background: black;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
    border: 3px solid white;
    cursor: pointer;
    overflow: hidden;
    z-index: 9999;
}
.back-btn::before {
    content:"";
    position:absolute;
    inset:-2px;
    background: linear-gradient(45deg, red, orange, yellow, green, cyan, blue, purple, red);
    background-size:400%;
    filter:blur(6px);
    z-index:-1;
    animation: rgb 5s linear infinite;
    border-radius:12px;
}
.back-btn:hover { background-color:#222; }
@keyframes rgb {
    0% { background-position:0 0; }
    50% { background-position:300% 0; }
    100% { background-position:0 0; }
}
</style>
</head>
<body>
<audio id="music" loop autoplay></audio>

<a href="/menu" class="back-btn">Volver al Menú</a>

<div class="container">
    <h1>Perfil de {{ username }}</h1>
    <table>
        <tr><th>Prueba</th><th>Puntaje</th></tr>
        <tr><td>Velocidad de Clicks</td><td>{{ scores.clicks }}/100</td></tr>
        <tr><td>Reacción</td><td>{{ scores.reaction }}/100</td></tr>
        <tr><td>Precisión</td><td>{{ scores.precision }}/100</td></tr>
        <tr><td>Memoria</td><td>{{ scores.memoria }}/100</td></tr>
        <tr><td>Letra Rápida</td><td>{{ scores.letter }}/100</td></tr>
        <tr><th>Promedio</th><th>{{ scores.average }}/100</th></tr>
    </table>
</div>
<script>const audio = document.getElementById("music");
const chosenSong = localStorage.getItem("chosenSong");

// Solo reproducir si ya hay una canción elegida
if(chosenSong){
    audio.src = chosenSong;
    audio.play();
}

// Función para elegir canción
function chooseSong(song){
    localStorage.setItem("chosenSong", song);
    audio.src = song;
    audio.play();
}
</script>
</body>
</html>
