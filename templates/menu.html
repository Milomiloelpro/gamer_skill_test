<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<audio id="music" loop autoplay></audio>


<button class="btn music-btn" onclick="playMusic()">🎧 Música</button>
<a href="/choose-music" class="btn music-btn">🎵 Elegir Cancion</a>

<div class="container">
    <h1>Gamer Skill Test</h1>
    <a href="/clicks" class="btn">Velocidad de Clicks</a>
    <a href="/precision" class="btn">Precisión</a>
    <a href="/memoria" class="btn">Memoria</a>
    <a href="/reaction" class="btn">Reacción</a>
    <a href="/letter" class="btn">Letra Rápida</a>
    <a href="/profile" class="btn">Perfil</a>
    <a href="/ranking" class="btn">Ranking Mundial</a>
</div>

<script>
const songs = [
    "/static/music.mp3",
    "/static/music2.mp3",
    "/static/music3.mp3",
    "/static/music4.mp3",
    "/static/music5.mp3",
    "/static/music6.mp3",
    "/static/music7.mp3",
    "/static/music8.mp3",
    "/static/music9.mp3",
    "/static/music10.mp3"
];

const audio = document.getElementById("music");
const chosenSong = localStorage.getItem("chosenSong");

// Solo reproducir si ya hay una canción elegida
if(chosenSong){
    audio.src = chosenSong;
    audio.play();
}

// Función para elegir canción
function chooseSong(song){
    localStorage.setItem("chosenSong", song);
    audio.src = song;
    audio.play();
}
</script>

</body>
</html>
